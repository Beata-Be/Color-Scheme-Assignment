<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Color Scheme Assignment</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
        }
        img {
            width: 500px;
            border-radius: 15px;
            margin-bottom: 20px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.2);
        }
        table {
            width: 80%;
            border-collapse: collapse;
            text-align: center;
        }
        th, td {
            border: 1px solid #000;
            padding: 15px;
        }
        /* Color Scheme Name Header with CSS font styles */
        .header-style {
            font-size: 24px;
            font-weight: bold;
            font-style: italic;
            text-transform: uppercase;
            letter-spacing: 1px;
            background-color: #f0f0f0;
        }
    </style>
</head>
<body>

    <!-- Chameleon Image -->
    <img src="https://www.publicdomainpictures.net/pictures/160000/velka/mediterranean-chameleon-1456834513RXP.jpg" alt="Chameleon">

    <table>
        <thead>
            <tr>
                <!-- Table Header with Scheme Name -->
                <th colspan="4" class="header-style">Chameleon Color Scheme</th>
            </tr>
        </thead>
        <tbody>
            <tr>
                <!-- Color names with background colors -->
                <td style="background-color: #556B2F; color: white;">Dark Olive Green</td>
                <td style="background-color: #B9C45A; color: black;">Wild Willow</td>
                <td style="background-color: #F7F8F7; color: black;">Vista White</td>
                <td style="background-color: #7C8860; color: white;">Trendy Green</td>
            </tr>
            <tr>
                <!-- Hex values -->
                <td>#556B2F</td>
                <td>#B9C45A</td>
                <td>#F7F8F7</td>
                <td>#7C8860</td>
            </tr>
            <tr>
                <!-- RGB values -->
                <td>rgb(85, 107, 47)</td>
                <td>rgb(185, 196, 90)</td>
                <td>rgb(247, 248, 247)</td>
                <td>rgb(124, 136, 96)</td>
            </tr>
            <tr>
                <!-- HSL values -->
                <td>hsl(82, 39%, 30%)</td>
                <td>hsl(66, 48%, 56%)</td>
                <td>hsl(120, 5%, 97%)</td>
                <td>hsl(78, 17%, 45%)</td>
            </tr>
        </tbody>
    </table>

</body>
</html>
